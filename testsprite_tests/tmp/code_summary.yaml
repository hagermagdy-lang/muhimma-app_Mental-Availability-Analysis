version: "2"
type: frontend
tech_stack:
  - language: JavaScript (ES Modules)
  - framework: React 19 + Vite 8 + React Router v7
  - ui_library: TailwindCSS 3.4 + Recharts 3.8 + Lucide React
  - other: PapaParse 5.5 (CSV parsing), react-dropzone 15, sessionStorage for state persistence
routes:
  - path: /
    file: src/pages/DataImport.jsx
    auth_required: false
    description: CSV file upload page — user uploads a Wide Text survey CSV to load brand/CEP data
  - path: /preview
    file: src/App.jsx (inline DataPreview component)
    auth_required: false
    description: Data preview page — shows parsed data summary before confirming analysis
  - path: /executive-summary
    file: src/pages/ExecutiveSummary.jsx
    auth_required: false
    description: Overview dashboard showing MPen, NS, MMS metrics for all brands with sortable table
  - path: /brand-analysis
    file: src/pages/BrandAnalysis.jsx
    auth_required: false
    description: Per-brand deep-dive page with bar charts and metric cards for selected brand
  - path: /cep-grid
    file: src/pages/CEPGrid.jsx
    auth_required: false
    description: Heatmap grid showing brand × CEP association strength with export functionality
features:
  - name: CSV Data Upload
    description: Upload a Wide Text format survey CSV where columns are CEPs and cells contain brand names
    files:
      - src/pages/DataImport.jsx
      - src/lib/dataProcessor.js
    entry_route: /
    user_interactions:
      - Click the upload area or drag and drop a CSV file
      - App parses the CSV using PapaParse
      - See file name and status after successful load
      - Click "Download Sample Format" link to get example CSV
      - Data is stored in sessionStorage for persistence across refreshes
    api_calls: []
    auth_required: false
  - name: Data Preview
    description: Review parsed data (brands, CEPs, respondent count) before proceeding to analysis
    files:
      - src/components/DataPreview.jsx
    entry_route: /preview
    user_interactions:
      - See summary of parsed brands, CEPs, and respondent count
      - Click Confirm to proceed to Executive Summary
      - Click Cancel/Reset to discard data and return to upload
    api_calls: []
    auth_required: false
  - name: Executive Summary
    description: High-level dashboard showing Mental Penetration, Network Size, and Mental Market Share for all brands
    files:
      - src/pages/ExecutiveSummary.jsx
      - src/lib/metrics.js
    entry_route: /executive-summary
    user_interactions:
      - View KPI cards for average MPen, total brands, and total respondents
      - See sortable brand performance table ranked by MMS
      - Top brand row highlighted with accent border
      - MMS column shows progress bar relative to max MMS
      - Hover info icons to see metric definitions
      - Click Export CSV to download brand metrics as CSV file
    api_calls: []
    auth_required: false
  - name: Brand Analysis
    description: Deep-dive analysis for a selected brand showing detailed metric cards and bar chart comparison
    files:
      - src/pages/BrandAnalysis.jsx
      - src/lib/metrics.js
    entry_route: /brand-analysis
    user_interactions:
      - Select a brand from the dropdown
      - View Mental Penetration, Network Size, Mental Market Share, and Associations metric cards
      - See bar chart comparing MPen across all brands with selected brand highlighted in orange
      - Hover info icons for metric definitions
      - MMS Position label (Strong/Stable/Vulnerable) based on relative thresholds
    api_calls: []
    auth_required: false
  - name: CEP Grid
    description: Heatmap visualization of brand × CEP associations with color intensity showing linkage strength
    files:
      - src/pages/CEPGrid.jsx
      - src/lib/dataProcessor.js
    entry_route: /cep-grid
    user_interactions:
      - View summary metric widgets at top (Total CEPs, Active CEPs, Dominant Space)
      - Scroll horizontally to see all CEP columns
      - Read color-coded cells showing % of respondents linking brand to each CEP
      - Export the full grid as a CSV file
    api_calls: []
    auth_required: false
known_limitations:
  - issue: App requires CSV data to be loaded before any analysis pages are functional; navigating directly to /executive-summary, /brand-analysis, or /cep-grid without data shows empty state
    location: src/App.jsx
    impact: No redirect guard — pages render empty if sessionStorage is cleared
  - issue: No login or authentication — app is fully client-side with no backend
    location: src/App.jsx
    impact: All data lives in sessionStorage; refreshing after clearing storage loses data
  - issue: Dev server running (not production build) — concurrent test load may cause instability
    location: vite.config.js
    impact: Tests limited to 15 high-priority cases
